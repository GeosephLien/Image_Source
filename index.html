<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Gallery</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1c2733;
      --muted: #6b7785;
      --border: #d8dee4;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background-color: #5b2c21;
      background-image: url("sourceimages/background/brickwall_01.jpg");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 100vh;
      color: var(--text);
    }

    .wrap {
      max-width: 100%;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .gallery {
      display: flex;
      flex-wrap: nowrap;
      gap: 0;
      align-items: stretch;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 1;
      min-height: 0;
      padding-bottom: 4px;
      cursor: grab;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .gallery::-webkit-scrollbar {
      display: none;
    }

    .gallery.is-dragging {
      cursor: grabbing;
    }

    .card {
      position: relative;
      flex: 0 0 auto;
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      height: 100%;
    }

    .card .card-inner {
      display: block;
      height: 100%;
    }

    .card img {
      --mask-url: url("sourceimages/mask/mask_01.jpg");
      display: block;
      width: auto;
      height: 100%;
      object-fit: contain;
      background: transparent;
      mix-blend-mode: multiply;
      opacity: 0.9;
      -webkit-mask-image: var(--mask-url), linear-gradient(#fff, #fff);
      mask-image: var(--mask-url), linear-gradient(#fff, #fff);
      -webkit-mask-mode: luminance;
      mask-mode: luminance;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      -webkit-user-drag: none;
      user-select: none;
    }

  </style>
</head>
<body>
  <main class="wrap">
    <section id="gallery" class="gallery" aria-live="polite"></section>
  </main>

  <script>
    const IMAGE_EXT = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".svg", ".avif"];
    const LOCAL_MANIFEST = "images/images.json";
    const FALLBACK_MASKS = [
      "sourceimages/mask/mask_01.jpg",
      "sourceimages/mask/mask_02.jpg",
      "sourceimages/mask/mask_03.jpg"
    ];

    function isImageFile(name) {
      const lower = name.toLowerCase();
      return IMAGE_EXT.some(ext => lower.endsWith(ext));
    }

    function pickRandom(items) {
      if (!Array.isArray(items) || items.length === 0) return "";
      return items[Math.floor(Math.random() * items.length)];
    }

    async function loadLocalManifest() {
      const res = await fetch(LOCAL_MANIFEST, { cache: "no-store" });
      if (!res.ok) throw new Error(`Manifest ${res.status}`);
      const raw = await res.text();
      const data = JSON.parse(raw.replace(/^\uFEFF/, ""));
      if (!Array.isArray(data)) throw new Error("Invalid manifest format");
      return data
        .filter(item => item && typeof item.path === "string" && isImageFile(item.path))
        .map(item => ({
          name: item.name || item.path.split("/").pop(),
          path: item.path,
          lastModified: item.lastModified || ""
        }));
    }

    function sortOldToNew(images) {
      return images.sort((a, b) => {
        const ta = a.lastModified ? Date.parse(a.lastModified) : Number.MAX_SAFE_INTEGER;
        const tb = b.lastModified ? Date.parse(b.lastModified) : Number.MAX_SAFE_INTEGER;
        if (ta !== tb) return ta - tb;
        return a.name.localeCompare(b.name);
      });
    }

    async function loadFromGitHubApi() {
      const owner = "GeosephLien";
      const repo = "Image_Source";
      const api = `https://api.github.com/repos/${owner}/${repo}/contents/images`;
      const res = await fetch(api, { headers: { Accept: "application/vnd.github+json" } });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const files = await res.json();
      return files
        .filter(item => item.type === "file" && isImageFile(item.name))
        .map(item => ({
          name: item.name,
          path: `images/${item.name}`,
          lastModified: ""
        }))
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    async function loadImages() {
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");

      function applyCardOverlap() {
        const cards = gallery.querySelectorAll(".card");
        cards.forEach((card, index) => {
          card.style.marginLeft = index === 0 ? "0" : `${-card.offsetWidth * 0.5}px`;
        });
      }

      try {
        const masks = FALLBACK_MASKS;
        let images;
        let source = "images/images.json";
        try {
          images = sortOldToNew(await loadLocalManifest());
        } catch {
          images = await loadFromGitHubApi();
          source = "GitHub API fallback";
        }

        if (images.length === 0) {
          if (status) status.textContent = "No images found in images/.";
          return;
        }

        const cards = images.map(item => {
          const url = item.path;
          const maskUrl = pickRandom(masks);
          return `
            <article class="card">
              <div class="card-inner">
                <img src="${url}" alt="${item.name}" loading="lazy" style="--mask-url: url('${maskUrl}');" />
              </div>
            </article>
          `;
        });

        gallery.innerHTML = cards.join("");
        applyCardOverlap();
        window.addEventListener("resize", applyCardOverlap);
        if (status) status.textContent = `Loaded ${images.length} images (${source})`;
      } catch (err) {
        if (status) status.textContent = `Load failed: ${err.message}`;
      }
    }

    function syncBackgroundWithScroll() {
      const gallery = document.getElementById("gallery");
      gallery.addEventListener("scroll", () => {
        document.body.style.backgroundPosition = `${-gallery.scrollLeft}px top`;
      }, { passive: true });
    }

    function enableMouseDragScroll() {
      const gallery = document.getElementById("gallery");
      let isDragging = false;
      let startX = 0;
      let lastX = 0;
      let lastTime = 0;
      let velocity = 0;
      let inertiaId = 0;
      let moved = false;
      let suppressClick = false;

      function stopInertia() {
        if (!inertiaId) return;
        cancelAnimationFrame(inertiaId);
        inertiaId = 0;
      }

      function startInertia() {
        const friction = 0.95;
        const minVelocity = 0.02; // px/ms

        function step() {
          const maxScroll = Math.max(0, gallery.scrollWidth - gallery.clientWidth);
          gallery.scrollLeft += velocity * 16.67;

          if (gallery.scrollLeft <= 0 || gallery.scrollLeft >= maxScroll) {
            stopInertia();
            return;
          }

          velocity *= friction;
          if (Math.abs(velocity) < minVelocity) {
            stopInertia();
            return;
          }
          inertiaId = requestAnimationFrame(step);
        }

        if (Math.abs(velocity) < minVelocity) return;
        stopInertia();
        inertiaId = requestAnimationFrame(step);
      }

      gallery.addEventListener("mousedown", (event) => {
        if (event.button !== 0) return;
        stopInertia();
        isDragging = true;
        moved = false;
        startX = event.clientX;
        lastX = event.clientX;
        lastTime = performance.now();
        velocity = 0;
        gallery.classList.add("is-dragging");
        event.preventDefault();
      });

      window.addEventListener("mousemove", (event) => {
        if (!isDragging) return;
        const now = performance.now();
        const deltaX = event.clientX - lastX;
        const dt = Math.max(1, now - lastTime);
        const scrollDelta = -deltaX;

        if (Math.abs(event.clientX - startX) > 3) moved = true;

        gallery.scrollLeft += scrollDelta;
        const instantVelocity = scrollDelta / dt;
        velocity = (velocity * 0.8) + (instantVelocity * 0.2);

        lastX = event.clientX;
        lastTime = now;
        event.preventDefault();
      });

      window.addEventListener("mouseup", () => {
        if (!isDragging) return;
        isDragging = false;
        gallery.classList.remove("is-dragging");
        startInertia();
        if (moved) {
          suppressClick = true;
          setTimeout(() => { suppressClick = false; }, 0);
        }
      });

      window.addEventListener("mouseleave", () => {
        if (!isDragging) return;
        isDragging = false;
        gallery.classList.remove("is-dragging");
        startInertia();
      });

      gallery.addEventListener("dragstart", (event) => {
        event.preventDefault();
      });

      gallery.addEventListener("click", (event) => {
        if (!suppressClick) return;
        event.preventDefault();
        event.stopPropagation();
      });
    }

    syncBackgroundWithScroll();
    enableMouseDragScroll();
    loadImages();
  </script>
</body>
</html>
